<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="GRaDS Lab">
  <!-- Square favicon derived from the lab logo (brand red + GRaDS lettering).
       Favicons must be square, so this is a compact monogram rather than the wide wordmark. -->
  <rect width="64" height="64" rx="14" fill="#c8102e"/>
  <!-- small robotics/geometry node motif echoing the logo -->
  <g stroke="#ffffff" stroke-width="2.4" fill="#ffffff">
    <line x1="32" y1="14" x2="22" y2="22"/>
    <line x1="32" y1="14" x2="42" y2="22"/>
    <circle cx="32" cy="14" r="3.4"/>
    <circle cx="22" cy="22" r="2.6"/>
    <circle cx="42" cy="22" r="2.6"/>
  </g>
  <text x="32" y="42" text-anchor="middle" dominant-baseline="central"
        font-family="Roboto, Arial, sans-serif" font-weight="700" font-size="22" fill="#ffffff">GR</text>
</svg>
